name: Daily Focus Automation

on:
  schedule:
    # 매일 21:00 KST (12:00 UTC)
    - cron: '0 12 * * *'

  # 수동 실행 가능하도록 설정
  workflow_dispatch:

jobs:
  nightly-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd daily-focus
          pip install -r requirements.txt

      - name: Run nightly flow
        env:
          # Lark credentials
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_USER_TOKEN: ${{ secrets.LARK_USER_TOKEN }}
          LARK_REFRESH_TOKEN: ${{ secrets.LARK_REFRESH_TOKEN }}
          LARK_USER_OPEN_ID: ${{ secrets.LARK_USER_OPEN_ID }}
          LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}

          # AI API keys
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd daily-focus
          python3 nightly_flow.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs-${{ github.run_number }}
          path: |
            ~/.daily-focus/*.json
          retention-days: 30
