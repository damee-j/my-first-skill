name: Daily Focus Automation

on:
  schedule:
    # 매일 21:00 KST (12:00 UTC)
    - cron: '0 12 * * *'

  # 수동 실행 가능하도록 설정
  workflow_dispatch:

jobs:
  nightly-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd daily-focus
          pip install -r requirements.txt

      # Lark 토큰 캐시 복원 (이전 실행에서 갱신된 refresh token 포함)
      # CI는 매 실행마다 파일시스템이 초기화되므로, 갱신된 토큰을 cache로 보존
      - name: Restore Lark token cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.daily-focus/lark_tokens.json
          key: lark-tokens-dummy-never-matches
          restore-keys: lark-tokens-

      - name: Run nightly flow
        env:
          # Lark credentials
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_USER_TOKEN: ${{ secrets.LARK_USER_TOKEN }}
          LARK_REFRESH_TOKEN: ${{ secrets.LARK_REFRESH_TOKEN }}
          LARK_USER_OPEN_ID: ${{ secrets.LARK_USER_OPEN_ID }}
          LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}

          # AI API keys
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd daily-focus
          python3 nightly_flow.py

      # 갱신된 Lark 토큰을 캐시에 저장 (다음 실행에서 복원됨)
      # run_id로 매번 새 캐시 생성 → restore-keys로 최신 캐시 복원
      - name: Save Lark token cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.daily-focus/lark_tokens.json
          key: lark-tokens-${{ github.run_id }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs-${{ github.run_number }}
          path: |
            ~/.daily-focus/*.json
          retention-days: 30
